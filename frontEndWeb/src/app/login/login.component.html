<section class="wrapper">
    <div class="wrapper1" [ngClass]="{ 'active': isActive }">
        <div class="form-box login">
            <h2>Iniciar Sesión</h2>
            <form (ngSubmit)="onLoginSubmit()">
                <div class="input-box">
                    <input type="email" [(ngModel)]="loginData.email" name="email" required>
                    <label for="">Correo</label>
                </div>
                <div class="input-box">
                    <input type="password" [(ngModel)]="loginData.password" name="password" required>
                    <label for="">Contraseña</label>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox"> Recuérdame</label>
                    <a href="#">Olvidaste la contraseña?</a>
                </div>
                <button type="submit">Entrar</button>
                <div class="login-register">
                    <p>No tienes una cuenta? <a class="register-link" href="javascript:void(0)" (click)="toggleRegister()">Regístrate aquí</a></p>
                </div>
            </form>
        </div>
        <div class="form-box register">
            <h2>Regístrate</h2>
            <form (ngSubmit)="onRegisterSubmit()">
                <div class="input-box">
                    <input type="text" [(ngModel)]="registerData.nombre" name="nombre" required>
                    <label for="">Nombre</label>
                </div>
                <div class="input-box">
                    <input type="text" [(ngModel)]="registerData.apellido" name="apellido" required>
                    <label for="">Apellido</label>
                </div>
                <div class="input-box">
                    <input type="email" [(ngModel)]="registerData.email" name="email" required>
                    <label for="">Correo</label>
                </div>
                <div class="input-box">
                    <input type="password" [(ngModel)]="registerData.password" name="password" required>
                    <label for="">Contraseña</label>
                </div>
                <div class="role-selection">
                    <p>Selecciona tu rol:</p>
                    <label>
                        <input type="radio" name="role" value="arrendador" [(ngModel)]="registerData.role" required>
                        Arrendador
                    </label>
                    <label>
                        <input type="radio" name="role" value="arrendatario" [(ngModel)]="registerData.role" required>
                        Arrendatario
                    </label>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox" required> Acepto los términos y condiciones</label>
                </div>
                <button type="submit">Registrarse</button>
                <div class="login-register">
                    <p>Tienes una cuenta? <a class="login-link" href="javascript:void(0)" (click)="toggleLogin()">Ingresa aquí</a></p>
                </div>
            </form>
        </div>
    </div>
</section>
